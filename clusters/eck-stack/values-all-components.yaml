# Overrides for full stack: Elasticsearch, Kibana, Fleet Server, Elastic Agent, and APM Server.
# Use with: -f values.yaml -f values-fleet.yaml -f values-all-components.yaml
# See: https://www.elastic.co/docs/deploy-manage/deploy/cloud-on-k8s/managing-deployments-using-helm-chart

eck-stack:
  eck-kibana:
    spec:
      config:
        xpack.fleet.packages:
          - name: system
            version: latest
          - name: elastic_agent
            version: latest
          - name: fleet_server
            version: latest
          - name: kubernetes
            version: latest
          - name: apm
            version: latest

  eck-apm-server:
    enabled: true
    count: 1
    elasticsearchRef:
      name: elasticsearch
    kibanaRef:
      name: kibana
    http:
      service:
        spec:
          ports:
            - name: http
              port: 8200
              targetPort: 8200
