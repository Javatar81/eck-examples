# Shared values for all ECK stack deployments.
# Use with a profile: -f values.yaml -f values-single-node.yaml | values-multi-node.yaml
# Values are under "eck-stack" so the dependency chart receives them.

# Wrapper-chart RBAC for Fleet Server and Elastic Agent (Kubernetes integration).
# When enabled, templates in templates/rbac-fleet-agents.yaml create ClusterRoles and
# bindings; disable duplicate RBAC on the eck-fleet-server / eck-agent subcharts.
fleetAgentRBAC:
  enabled: false
  fleetServer:
    enabled: true
    serviceAccountName: fleet-server
    clusterRoleName: fleet-server
  elasticAgent:
    enabled: true
    serviceAccountName: elastic-agent
    clusterRoleName: elastic-agent

eck-stack:
  eck-elasticsearch:
    enabled: true
    fullnameOverride: elasticsearch
    version: "9.3.0"
    nodeSets:
      - name: default
        count: 1
        config:
          # For dev/minimal; production should set vm.max_map_count=262144 and allow mmap
          node.store.allow_mmap: false
        volumeClaimTemplates:
          - metadata:
              name: elasticsearch-data
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 5Gi

  eck-kibana:
    enabled: true
    fullnameOverride: kibana
    version: "9.3.0"
    elasticsearchRef:
      name: elasticsearch
    spec:
      count: 1

  # Disable other stack components
  eck-agent:
    enabled: false
  eck-fleet-server:
    enabled: false
  eck-beats:
    enabled: false
  eck-logstash:
    enabled: false
  eck-apm-server:
    enabled: false
  eck-enterprise-search:
    enabled: false
  eck-autoops-agent-policy:
    enabled: false
  eck-package-registry:
    enabled: false
